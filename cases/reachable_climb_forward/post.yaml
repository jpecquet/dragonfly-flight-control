version: 1
simulation:
  driver: multi_yaml_case
  cases:
  - cases/reachable_climb_forward/case_0_sync.yaml
  - cases/reachable_climb_forward/case_1_sync.yaml
  - cases/reachable_climb_forward/case_2_sync.yaml
  - cases/reachable_climb_forward/case_3_sync.yaml
  - cases/reachable_climb_forward/case_4_sync.yaml
  - cases/reachable_climb_forward/case_5_sync.yaml
  - cases/reachable_climb_forward/case_6_sync.yaml
  run_dir: docs/research/reachable/artifacts/climb_forward_sync
  binary: build/bin/dragonfly
docs_media:
  media_dir: docs/_static/media/reachable
  themes:
  - light
  - dark
artifacts:
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_0/output.h5'
  output: reachable_climb_forward_0_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_1/output.h5'
  output: reachable_climb_forward_1_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_2/output.h5'
  output: reachable_climb_forward_2_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_3/output.h5'
  output: reachable_climb_forward_3_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_4/output.h5'
  output: reachable_climb_forward_4_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_5/output.h5'
  output: reachable_climb_forward_5_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_6/output.h5'
  output: reachable_climb_forward_6_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
