version: 1
simulation:
  driver: multi_yaml_case
  cases:
  - cases/reachable_boundary/case_0_sync.yaml
  - cases/reachable_boundary/case_1_sync.yaml
  - cases/reachable_boundary/case_2_sync.yaml
  - cases/reachable_boundary/case_3_sync.yaml
  run_dir: docs/research/reachable/artifacts/boundary_sync
  binary: build/bin/dragonfly
docs_media:
  media_dir: docs/_static/media/reachable
  themes:
  - light
  - dark
artifacts:
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_0/output.h5'
  output: reachable_boundary_0_panel.{theme}.png
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_1/output.h5'
  output: reachable_boundary_1_panel.{theme}.png
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_2/output.h5'
  output: reachable_boundary_2_panel.{theme}.png
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_3/output.h5'
  output: reachable_boundary_3_panel.{theme}.png
