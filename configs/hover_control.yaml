morphology:
  omega: 25.1327  # 8*pi rad/s nondimensional
  wings:
    - name: fore
      side: left
      mu0: 0.025
      lb0: 0.75
      nu: 0.03
      ar: 7.0
      phase: 0.0
      aero_model: wang2004
    - name: fore
      side: right
      mu0: 0.025
      lb0: 0.75
      nu: 0.03
      ar: 7.0
      phase: 0.0
      aero_model: wang2004
    - name: hind
      side: left
      mu0: 0.025
      lb0: 0.75
      nu: 0.03
      ar: 7.0
      phase: 3.14159
      aero_model: wang2004
    - name: hind
      side: right
      mu0: 0.025
      lb0: 0.75
      nu: 0.03
      ar: 7.0
      phase: 3.14159
      aero_model: wang2004

# Control scheme:
#   gamma_mean = fixed (anatomical minimum)
#   psi_amp = fixed (near-optimal, ~57 deg)
#   psi_phase = fixed (90 deg)
#   phi_amp = controlled (tracks u_z -> 0)
#   psi_mean = controlled (tracks u_x -> 0)
control:
  gamma: 0.7854    # 45 deg stroke plane angle
  psi_amp: 0.995   # ~57 deg pitch amplitude (fixed)
  psi_phase: 1.5708 # 90 deg pitch phase (fixed)

  # Proportional gains
  Kp_z: 0.7    # phi_amp gain on -u_z
  Kp_x: 1.2    # psi_mean gain on -u_x

  # Timing (in wingbeats)
  avg_window: 0.5    # velocity averaging window
  sense_delay: 0.25  # neural processing delay
  muscle_tau: 0.5    # neuromuscular lag time constant

  # Saturation limits
  phi_amp_min: 0.20   # ~11 deg
  phi_amp_max: 0.90   # ~52 deg
  psi_mean_min: -0.10
  psi_mean_max: 0.80  # ~46 deg

simulation:
  n_wingbeats: 30
  steps_per_wingbeat: 200
  ux0: 2.0    # initial forward velocity
  uz0: -1.0   # initial downward velocity

# Equilibrium finder (to get the setpoints)
algorithm:
  n_samples: 500
  max_eval: 500
  equilibrium_tol: 1.0e-4

output: hover_control.h5
