version: 1

simulation:
  driver: hover-control
  hover_config: configs/hover_control.yaml
  run_dir: docs/research/hover/artifacts
  binary: build/bin/dragonfly

docs_media:
  media_dir: docs/_static/media/hover
  render_config: cases/hover_control/render_config.json
  themes: [light, dark]
  frame_step: 10

artifacts:
- kind: hover_control
  input_h5: "{run_dir}/hover_control.h5"
  output: hover_control.{theme}.png
- kind: simulation_video
  input_h5: "{run_dir}/hover_control.h5"
  output: hover_control.{theme}.mp4
