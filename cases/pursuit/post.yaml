version: 1

simulation:
  driver: yaml_track_case
  case_file: cases/pursuit/case.yaml
  run_dir: runs/pursuit/sim
  binary: build/bin/dragonfly

docs_media:
  media_dir: docs/_static/media/pursuit
  render_config: cases/pursuit/render_config.json
  themes: [light, dark]

artifacts:
  - kind: tracking_video
    input_h5: "{run_dir}/output.h5"
    output: pursuit_animation.{theme}.mp4
    frame_step: 20
