morphology:
  omega: 25.1327
  wings:
    - name: fore
      side: left
      mu0: 0.025
      lb0: 0.75
      phase: 0.0
      aero_model: wang2004
    - name: fore
      side: right
      mu0: 0.025
      lb0: 0.75
      phase: 0.0
      aero_model: wang2004
    - name: hind
      side: left
      mu0: 0.025
      lb0: 0.75
      phase: 3.14159
      aero_model: wang2004
    - name: hind
      side: right
      mu0: 0.025
      lb0: 0.75
      phase: 3.14159
      aero_model: wang2004

control_bounds:
  gamma_mean: [0.0, 3.14159]
  phi_mean: 0.0
  phi_amp: [0.1, 1.5]
  phi_phase: 0.0
  psi_mean: 0.0
  psi_amp: [0.1, 1.5708]
  psi_phase: 0.0

grid:
  ux_min: -20.0
  ux_max: 20.0
  n_ux: 20
  uz_min: -20.0
  uz_max: 20.0
  n_uz: 20

algorithm:
  n_samples: 25
  max_eval: 300
  equilibrium_tol: 1.0e-6

output: reachable_phase_zero.h5
