version: 1
simulation:
  driver: multi_yaml_case
  cases:
  - cases/reachable_climb/case_0_sync.yaml
  - cases/reachable_climb/case_1_sync.yaml
  - cases/reachable_climb/case_2_sync.yaml
  - cases/reachable_climb/case_3_sync.yaml
  - cases/reachable_climb/case_4_sync.yaml
  - cases/reachable_climb/case_5_sync.yaml
  - cases/reachable_climb/case_6_sync.yaml
  - cases/reachable_climb/case_7_sync.yaml
  run_dir: docs/research/reachable/artifacts/climb_sync
  binary: build/bin/dragonfly
docs_media:
  media_dir: docs/_static/media/reachable
  themes:
  - light
  - dark
artifacts:
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_0/output.h5'
  output: reachable_climb_0_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
  input_h5: '{run_dir}/branch_1/output.h5'
  output: reachable_climb_1_panel.{theme}.png
  n_samples: 10
  stroke_lim: 0.5
  force_scale: 0.06
- kind: boundary_stroke_and_forces
